<!--
Projeto: Formulário de Pesquisa
Baseado no projeto "Survey Form" do freeCodeCamp
Adaptado por: Jonh Nobre
Objetivo: Praticar a criação de formulários usando HTML e CSS
-->


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pesquisa</title>
</head>
<body>
   <!-- Container principal que envolver todo o conteúdo da página --> 
    <div class="container">

        <!-- Cabeçalho do formulário -->
         <header class="header">

            <!-- Título principal da página -->
             <h1 id="title" class="text-center">
                Formulário de Pesquisa
             </h1>

             <!-- Pequena descrição explicando o objetivo do formulário -->
             <p id="description" class="description text-center">
                Agradecemos por dedicar seu tempo para nos ajudar a melhorar a plataforma.
             </p>

         </header>

         <!-- Início do formulário -->
         <form id ="survey-form">

            <!-- Campo para inserir  o nome -->
             <div class="form-group">
               <label id="name-label" for="name">Nome:</label>

               <!-- Input de texto obrigatório para o nome do usuário -->
               <input
                  type="text"
                  name="name"
                  id="name"
                  class="form-control"
                  placeholder="Digite o seu nome"
                  required
               />
             </div>

             <!-- Campo para inserir o email -->
              <div class="form-group">
               <label id="email-label" for="email">E-mail:</label>

               <!-- Input do tipo email com validação automática  -->
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-contol"
                  placeholder="Digite o seu e-mail"
                  required
                />
              </div>

              <!-- Campo para inserir a idade (opcional) -->
               <div class="form-group">
                  <label id="number-label" for="number">
                  Idade <span class="clue">(opcional):</span>
                  </label>

                  <!-- Input numérico com limite mínimo e máximo -->
                  <input
                  type="number"
                  name="age"
                  id="number"
                  min="10"
                  max="99"
                  class="form-control"
                  placeholder="Idade"
                  />
               </div>

               <!-- Pergunta sobre a ocupação atual do usuário -->
                <div class="form-group">
                  <p>Qual a opção que melhor descreve sua função atual?</p>

                  <!-- Menu suspenso para selecionar a ocupação -->
                   <select id="dropdown" name="role" class="form-control" required>

                     <!-- Opção padrão desabilitada -->
                      <option disabled selected value>
                        Selecione a função atual
                      </option>

                      <option value="student">Estudante</option>
                      <option value="job">Vaga de tempo integral</option>
                      <option value="learner">Estudante em tempo integral</option>
                      <option value="preferNO">Prefiro não dizer</option>
                      <option value="other">Outra</option>

                     </select>
                </div>


         </form>
    </div>

</body>
</html>
